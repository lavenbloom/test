apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-habit-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: habit-service
  template:
    metadata:
      labels:
        app: habit-service
    spec:
      containers:
        - name: habit-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-habit-service-config
            - secretRef:
                name: {{ .Release.Name }}-habit-service-secret
